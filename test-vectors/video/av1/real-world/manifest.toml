# AV1 Stego Corpus Manifest — v0.3 W4 Baseline
#
# Recorded baseline metrics for the fixtures driven by
# `core/tests/av1_corpus_validation.rs`. Source files live under
# `core/test-vectors/video/h264/real-world/source/` (shared with the
# H.264 corpus — see that directory's README for provenance and the
# regen scripts. Files are gitignored.)
#
# Baselines re-recorded 2026-05-21 after the plane-fill fix (see
# `feedback_visual_fidelity_is_correctness`). Pre-fix values were
# measured on a broken encode where only ~25% of every frame got
# real content and the rest was default-init neutral gray — natural
# packet sizes were 4-6× smaller and Y-PSNR was 11-16 dB. After the
# fix (canonical `Plane::copy_from_raw_u8` instead of manual
# `chunks_mut`), Y-PSNR is ~46-48 dB across the corpus, packet sizes
# match rav1e CLI baseline, and AV1 round-trip survives clean.
#
# W5 reframed local-only: regression-bound assertions live in
# `core/tests/av1_corpus_validation.rs` (`Fixture` struct's
# `baseline_*` fields + `assert_within_pct` helper at ±5% tolerance).
# Y-PSNR gate at `core/tests/av1_visual_psnr.rs` with floor 25 dB.
# This TOML mirrors the test's inline baselines; keep both in sync.

