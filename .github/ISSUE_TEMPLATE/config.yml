# GitHub issue-template configuration. Forces contributors to pick
# a template (no blank-issue button) and surfaces the email
# channels for things that don't belong in public issues.

blank_issues_enabled: false

contact_links:
  - name: Security vulnerability disclosure
    url: https://github.com/cgaffga/phasmcore/security/advisories/new
    about: Report security findings privately. See SECURITY.md for the full process.
  - name: Code of Conduct report
    url: mailto:conduct@phasm.app
    about: Reports of behavior that violates the Contributor Covenant.
  - name: Press inquiries
    url: mailto:press@phasm.app
    about: Media, journalism, embargoed coverage requests.
  - name: General questions
    url: mailto:info@phasm.app
    about: Anything that doesn't fit a bug / feature / question template.
