# Phase C.6.2 (#416) — OpenH264 cross-arch determinism check.
#
# Runs `tests/openh264_cross_arch_determinism.rs` on macOS arm64,
# Linux x86_64, and Linux arm64. The test computes SHA-256 of a
# stego Annex-B output produced from a synthetic YUV fixture with
# PHASM_DETERMINISTIC_SEED=42, prints the hash per-arch to stderr.
# First-run logs reveal whether the OH264 fork is bit-identical
# across these arches; a follow-up commit pins the per-arch (or
# unified) hash and flips the test from RECORD to ASSERT mode.
#
# ─────────────────────────────────────────────────────────────────────
# AVC patent posture — NO BINARY PERSISTENCE.
# ─────────────────────────────────────────────────────────────────────
#
# Per project policy ("never build video on GitHub; don't ship
# binaries on github.com/crates.io"), this workflow is structured so
# the OH264-linked test binary exists ONLY transiently on the GitHub-
# owned runner VM and is destroyed at job teardown along with the
# VM itself. Specifically:
#
#   - permissions: contents: read  → workflow cannot create commits,
#     releases, packages, or any persistent GitHub artifact.
#   - NO actions/cache step        → target/ never persists to GH cache.
#   - NO actions/upload-artifact   → build outputs never become
#     downloadable artifacts.
#   - NO if: always() / failure()  → no failure-handler upload pattern.
#   - ulimit -c 0                  → no core dumps if a test segfaults.
#   - Explicit rm -rf at job end   → belt-and-suspenders, even though
#     the runner VM is destroyed regardless.
#   - Test prints hash hex + size + arch tag ONLY                —
#     NEVER binary content (no hexdump, no base64-of-bytes).
#
# What persists after the job: text-only stderr/stdout in the
# GitHub Actions log (90-day retention, accessible to anyone who can
# view the repo). No binary, no .a, no .so, no test binary.
#
# Trigger: workflow_dispatch only. Manual gating — the operator
# decides when to spend the ~3-5 min of CI wall time and accept the
# transient build on third-party infra.

name: openh264-cross-arch-determinism

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hash-record:
    name: hash-record (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-arm64
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      # phasmcore mirror INTENTIONALLY does not carry the
      # vendor/phasm-openh264 submodule (per #381 / Phase B.12 — the
      # mirror is git-archive'd and a missing submodule triggers the
      # graceful stub build path in core/openh264-sys/build.rs). For
      # this workflow we need the real fork, so we check it out
      # explicitly as a sibling at the path build.rs expects
      # (`../../vendor/phasm-openh264` from `openh264-sys/build.rs`).
      - name: Checkout phasmcore
        uses: actions/checkout@v4
        with:
          path: phasmcore

      - name: Checkout phasm-openh264 fork at phasm-stego HEAD
        uses: actions/checkout@v4
        with:
          repository: cgaffga/phasm-openh264
          ref: phasm-stego
          path: vendor/phasm-openh264
          submodules: recursive

      - name: Toolchain
        uses: dtolnay/rust-toolchain@stable

      # Native build deps for the phasm-openh264 fork via meson+ninja.
      # nasm is required on x86_64 (OpenH264 has hand-written assembly
      # in codec/common/x86/); harmless extra package on arm64.
      - name: Install meson + ninja + nasm (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends meson ninja-build nasm
          ulimit -c 0     # disable core dumps; no crash binaries on disk

      - name: Install meson + ninja + nasm (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install meson ninja nasm
          ulimit -c 0

      - name: Show toolchain + matrix label + layout
        shell: bash
        run: |
          rustc --version
          cargo --version
          echo "matrix label: ${{ matrix.label }}"
          echo "fork pinned to: $(git -C vendor/phasm-openh264 rev-parse HEAD)"
          ls -d phasmcore/openh264-sys vendor/phasm-openh264/codec >/dev/null \
            && echo "layout: phasmcore/openh264-sys + vendor/phasm-openh264 ✓"

      # The phasmcore mirror STRIPS `h264-encoder` + `core-openh264-sys` from
      # Cargo.toml (crates.io / Via-LA AVC — the PUBLISHED crate ships NO H.264
      # encoder). This determinism gate, however, must BUILD the encoder to
      # hash its output. Re-add the encoder wiring to the CHECKED-OUT mirror
      # ONLY — this clone is transient + never pushed back — so
      # `--features h264-encoder` resolves against the openh264-sys subdir
      # (present on the mirror) + the fork checked out as a sibling above.
      # NO binary is shipped: the encoder is built transiently in the runner
      # VM and erased by the post-run cleanup + the VM teardown. CI-only.
      - name: Re-enable h264-encoder on the mirror checkout (CI-only, never pushed)
        working-directory: phasmcore
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          p = pathlib.Path("Cargo.toml")
          s = p.read_text()
          if 'members = ["cli"]' in s:
              s = s.replace('members = ["cli"]', 'members = ["cli", "openh264-sys"]', 1)
          if "\nh264-encoder =" not in s:
              s = s.replace('h264-decoder = ["video"]',
                            'h264-decoder = ["video"]\nh264-encoder = ["h264-decoder", "parallel", "simd", "dep:core-openh264-sys"]', 1)
          if "\ncore-openh264-sys =" not in s:
              s = s.replace("[dependencies]\n",
                            '[dependencies]\ncore-openh264-sys = { path = "openh264-sys", optional = true }\n', 1)
          p.write_text(s)
          PY
          echo "--- re-enabled encoder wiring (CI-only) ---"
          grep -nE 'members =|^h264-encoder =|^core-openh264-sys =' Cargo.toml

      # The actual test. cargo test --no-fail-fast keeps going if a
      # test fails (we want hashes from all matrix legs even if one
      # asserts). --nocapture prints the eprintln hash line into
      # the job log. working-directory is phasmcore/ — build.rs
      # then resolves `../../vendor/phasm-openh264` to the sibling
      # checkout above.
      - name: Run determinism hash-record
        working-directory: phasmcore
        shell: bash
        run: |
          ulimit -c 0
          cargo test --release \
            --features "h264-encoder" \
            --test openh264_cross_arch_determinism \
            --no-fail-fast \
            -- --nocapture

      # Belt-and-suspenders: erase the build dir + meson static-lib
      # build dir before the runner VM tears down. The VM destroys
      # everything anyway; this is policy reinforcement.
      - name: Erase build outputs (post-run cleanup)
        if: always()
        shell: bash
        run: |
          rm -rf phasmcore/target vendor/phasm-openh264
          # The meson static-lib build dir lives inside the cargo
          # OUT_DIR (phasmcore/target/release/build/core-openh264-sys-*/
          # out/openh264-static); the rm above covers it. We also wipe
          # the fork checkout (no need to persist OH264 source between
          # jobs, and the runner VM is destroyed regardless).

      # EXPLICITLY ABSENT:
      #   - actions/upload-artifact (would persist build outputs)
      #   - actions/cache (would persist target/ across runs)
      #   - if: failure() upload step (would archive failure binaries)
      #   - docker push / ghcr.io publish (would distribute the image)
      # All of these were considered and intentionally omitted per the
      # AVC patent posture documented at the top of this file.
