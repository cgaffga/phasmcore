[package]
name = "phasm-cli"
version = "0.2.7"
edition = "2024"
license = "GPL-3.0-only"
description = "CLI for phasm-core steganography"
repository = "https://github.com/cgaffga/phasmcore"
authors = ["Christoph Gaffga"]

[[bin]]
name = "phasm"
path = "src/main.rs"

[dependencies]
# IMPORTANT: do NOT add `h264-encoder` to phasm-core's features here.
# The GitHub-release CLI binary distributed via cargo-dist must NOT
# bundle the H.264 encoder (Via LA AVC patent obligations — see
# `docs/design/video/h264/video-steganography.md` § "Patent licensing —
# distribution plan"). Users wanting CLI video stego rebuild from
# source themselves with:
#     cargo install phasm-cli --features h264-encoder
phasm-core = { path = "..", features = ["parallel", "video"] }
clap = { version = "4", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "webp", "bmp", "tiff", "gif"] }
indicatif = "0.17"
rpassword = "7"

[features]
default = []
# Enable Phase 6 H.264 encoder for CLI video stego. Source-only —
# never enabled in cargo-dist GitHub-release builds. Forwards to
# phasm-core's `h264-encoder` feature.
h264-encoder = ["phasm-core/h264-encoder"]
# Enable Phase 6.3 CABAC stego encode/decode (the EXPERIMENTAL
# pure-Rust 4-domain bypass-bin pipeline). D.0 ship-direction
# (2026-05-14) demotes this to opt-in EXPERIMENTAL behind
# `--encoder experimental-rust`; default `--encoder openh264`.
# When this feature is ON, `phasm video-encode` exposes the
# `--encoder` flag.
cabac-stego = ["h264-encoder", "phasm-core/cabac-stego"]
# D.0 (2026-05-14) — Production OpenH264-backend stego pipeline.
# Default encoder for `phasm video-encode`. Links the vendored
# OpenH264 fork via `core-openh264-sys` (meson+ninja build at
# `vendor/phasm-openh264`). Source-only; cargo-dist binary
# excludes this for AVC patent reasons.
# Implies `cabac-stego` so the CLI shares the same MP4 demux +
# remux infrastructure (ffmpeg → YUV → annex-B → ffmpeg → MP4).
openh264-backend = ["cabac-stego", "phasm-core/openh264-backend"]
