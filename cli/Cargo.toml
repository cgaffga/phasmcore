[package]
name = "phasm-cli"
version = "0.2.2"
edition = "2024"
license = "GPL-3.0-only"
description = "CLI for phasm-core steganography"
repository = "https://github.com/cgaffga/phasmcore"
authors = ["Christoph Gaffga"]

[[bin]]
name = "phasm"
path = "src/main.rs"

[dependencies]
# IMPORTANT: do NOT add `h264-encoder` to phasm-core's features here.
# The GitHub-release CLI binary distributed via cargo-dist must NOT
# bundle the H.264 encoder (Via LA AVC patent obligations — see
# `docs/design/h264-video-steganography.md` § "Patent licensing —
# distribution plan"). Users wanting CLI video stego rebuild from
# source themselves with:
#     cargo install phasm-cli --features h264-encoder
phasm-core = { path = "..", features = ["parallel", "video"] }
clap = { version = "4", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "webp", "bmp", "tiff", "gif"] }
indicatif = "0.17"
rpassword = "7"

[features]
default = []
# Enable Phase 6 H.264 encoder for CLI video stego. Source-only —
# never enabled in cargo-dist GitHub-release builds. Forwards to
# phasm-core's `h264-encoder` feature.
h264-encoder = ["phasm-core/h264-encoder"]
# Enable Phase 6.3 CABAC stego encode/decode (the production
# 4-domain bypass-bin pipeline used by the iOS + Android bridges).
# When ON, `phasm video-encode` and `phasm decode` route MP4 video
# through ffmpeg → YUV → v2 streaming orchestrator → Annex-B →
# ffmpeg → MP4. When OFF, they fall back to the legacy CAVLC
# bitstream-mod path (`h264_ghost_encode/decode`). Implies
# `h264-encoder`. Source-only; cargo-dist binary uses the legacy
# path (no encoder bundled).
cabac-stego = ["h264-encoder", "phasm-core/cabac-stego"]
